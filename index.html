<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NAVY WARFARE: GLB EDITION</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #loading { position: absolute; width: 100%; height: 100%; background: #000; color: #f00; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #ui { position: absolute; bottom: 40px; left: 40px; color: #fff; z-index: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        #radar { position: absolute; top: 20px; right: 20px; width: 180px; height: 180px; border: 2px solid #555; background: rgba(0,20,0,0.7); border-radius: 50%; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; border: 2px solid rgba(255,255,255,0.5); transform: translate(-50%, -50%); border-radius: 50%; }
        button { padding: 20px 50px; background: #f00; color: #fff; border: none; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="loading">
    <h1>INITIALIZING NAVY ASSETS...</h1>
    <p id="loadStatus">Downloading 3D Models (Carrier/Jets)...</p>
    <button id="startBtn" style="display:none;">DEPLOY NOW</button>
</div>

<canvas id="radar"></canvas>
<div id="crosshair"></div>
<div id="ui">
    <div id="vehicle">STATUS: INFANTRY</div>
    <div id="weapon">WEAPON: M4A1 CARBINE</div>
    <div id="coords">COORDS: 0, 0, 0</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
    import { Water } from 'three/addons/objects/Water.js';
    import { Sky } from 'three/addons/objects/Sky.js';

    let scene, camera, renderer, controls, water, socket;
    let moveF = false, moveB = false, moveL = false, moveR = false;
    let mode = "walking"; // walking, jet, boat
    let playerModel, jetModel, weaponModel;
    const loader = new GLTFLoader();
    const clock = new THREE.Clock();

    // High Quality Model Links
    const ASSETS = {
        carrier: 'https://vazxmixjsiawhamofees.supabase.co/storage/v1/object/public/models/ship-large/model.gltf',
        jet: 'https://vazxmixjsiawhamofees.supabase.co/storage/v1/object/public/models/low-poly-spaceship/model.gltf',
        gun: 'https://vazxmixjsiawhamofees.supabase.co/storage/v1/object/public/models/blaster/model.gltf'
    };

    init();

    async function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 50000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        controls = new PointerLockControls(camera, document.body);
        document.getElementById('startBtn').onclick = () => {
            controls.lock();
            document.getElementById('loading').style.display = 'none';
            initAudio();
        };

        setupEnvironment();
        await loadModels();
        setupInput();
        connect();
        animate();
    }

    function setupEnvironment() {
        // Sky & Sun
        const sky = new Sky(); sky.scale.setScalar(450000); scene.add(sky);
        const sun = new THREE.Vector3();
        sun.setFromSphericalCoords(1, THREE.MathUtils.degToRad(88), THREE.MathUtils.degToRad(180));
        sky.material.uniforms['sunPosition'].value.copy(sun);

        // Water
        const waterGeo = new THREE.PlaneGeometry(50000, 50000);
        water = new Water(waterGeo, {
            textureWidth: 512, textureHeight: 512,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', t => { t.wrapS = t.wrapT = THREE.RepeatWrapping; }),
            sunDirection: sun, sunColor: 0xffffff, waterColor: 0x001e0f, distortionScale: 3.7,
        });
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(100, 100, 100);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    }

    async function loadModels() {
        // Load Carrier
        loader.load(ASSETS.carrier, (gltf) => {
            const ship = gltf.scene;
            ship.scale.set(60, 60, 60);
            ship.position.set(0, -2, 0);
            scene.add(ship);
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('loadStatus').innerText = "SYSTEMS ONLINE";
        });

        // Load Jet
        loader.load(ASSETS.jet, (gltf) => {
            jetModel = gltf.scene;
            jetModel.position.set(20, 22, 100);
            jetModel.scale.set(5, 5, 5);
            scene.add(jetModel);
        });

        // Load Gun (First Person)
        loader.load(ASSETS.gun, (gltf) => {
            weaponModel = gltf.scene;
            weaponModel.scale.set(0.2, 0.2, 0.2);
            camera.add(weaponModel);
            weaponModel.position.set(0.5, -0.5, -1);
            weaponModel.rotation.y = Math.PI;
            scene.add(camera);
        });
    }

    function initAudio() {
        const listener = new THREE.AudioListener();
        camera.add(listener);
        // Sound logic would go here
    }

    function setupInput() {
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveF = true;
            if(e.code === 'KeyS') moveB = true;
            if(e.code === 'KeyA') moveL = true;
            if(e.code === 'KeyD') moveR = true;
            if(e.code === 'KeyE') toggleVehicle();
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveF = false;
            if(e.code === 'KeyS') moveB = false;
            if(e.code === 'KeyA') moveL = false;
            if(e.code === 'KeyD') moveR = false;
        });
        document.addEventListener('mousedown', fireWeapon);
    }

    function toggleVehicle() {
        const distToJet = camera.position.distanceTo(jetModel.position);
        if (mode === "walking" && distToJet < 20) {
            mode = "jet";
            weaponModel.visible = false;
            document.getElementById('vehicle').innerText = "STATUS: PILOTING JET";
        } else if (mode === "jet") {
            mode = "walking";
            weaponModel.visible = true;
            camera.position.y += 10;
            document.getElementById('vehicle').innerText = "STATUS: INFANTRY";
        }
    }

    function fireWeapon() {
        if(mode === "walking") {
            weaponModel.position.z += 0.1; // Recoil
            setTimeout(() => weaponModel.position.z -= 0.1, 50);
            // Spawn Missile Logic
            const missile = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffff00}));
            missile.position.copy(camera.position);
            scene.add(missile);
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            const interval = setInterval(() => {
                missile.position.addScaledVector(dir, 10);
                if(missile.position.length() > 5000) { scene.remove(missile); clearInterval(interval); }
            }, 10);
        }
    }

    function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${protocol}//${window.location.host}/ws`);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (controls.isLocked) {
            if (mode === "walking") {
                const speed = 40;
                if(moveF) controls.moveForward(speed * delta);
                if(moveB) controls.moveForward(-speed * delta);
                if(moveL) controls.moveRight(-speed * delta);
                if(moveR) controls.moveRight(speed * delta);

                // Realistic Gravity & Ship Collision
                if(camera.position.y > 22) camera.position.y -= 30 * delta;
                else camera.position.y = 22; // Stay on deck
            } 
            else if (mode === "jet") {
                const jetSpeed = 200 * delta;
                jetModel.translateZ(jetSpeed);
                if(moveL) jetModel.rotation.y += delta;
                if(moveR) jetModel.rotation.y -= delta;
                if(moveF) jetModel.position.y += jetSpeed * 0.5;
                if(moveB) jetModel.position.y -= jetSpeed * 0.5;

                camera.position.copy(jetModel.position).add(new THREE.Vector3(0, 5, -15));
                camera.lookAt(jetModel.position);
            }
        }

        water.material.uniforms['time'].value += 1.0 / 60.0;
        document.getElementById('coords').innerText = `COORDS: ${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)}`;
        
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
