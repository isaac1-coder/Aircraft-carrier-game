<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>USS Enterprise Simulator - WASM</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001020; font-family: monospace; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        #minimap { position: absolute; bottom: 20px; right: 20px; width: 200px; height: 200px; border: 2px solid #555; background: rgba(0,0,0,0.5); }
        .stats { font-size: 12px; color: #0f0; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>USS ENTERPRISE (CVN-65)</h1>
        <div class="stats" id="status">Mode: DECK WALK | Press 'F' to Enter F-18</div>
        <div class="stats" id="coords">Pos: 0, 0, 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="minimap"></div>

    <!-- Load the Go WASM bridge -->
    <script src="https://raw.githubusercontent.com/golang/go/master/misc/wasm/wasm_exec.js"></script>
    <script>
        if (!WebAssembly.instantiateStreaming) {
            WebAssembly.instantiateStreaming = async (resp, importObject) => {
                const source = await (await resp).arrayBuffer();
                return await WebAssembly.instantiate(source, importObject);
            };
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
        });
    </script>
</body>
</html>
